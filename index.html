<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🚗 Vesta: ТО & Бюджет (Supabase)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app-container">
    <header>
        <h1>🚗 Vesta: ТО & Бюджет</h1>
        <div class="header-controls">
            <button id="theme-toggle" title="Переключить тему">🌙</button>
            <button id="sync-indicator" class="synced" title="Статус синхронизации">☁️</button>
            <button id="share-table-btn" class="icon-btn" title="Поделиться">👥</button>
            <button id="logout-btn" class="icon-btn" title="Выйти" style="display:none;">🚪</button>
        </div>
    </header>

    <!-- Панель авторизации (email/пароль) -->
    <div id="auth-panel" class="card">
        <h3>Вход / Регистрация</h3>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Пароль">
        <button id="login-btn" class="primary-btn">Войти</button>
        <button id="register-btn" class="secondary-btn">Регистрация</button>
        <span id="auth-status"></span>
    </div>

    <!-- Основной интерфейс (скрыт до авторизации) -->
    <div id="data-panel" style="display:none;">
        <div class="tabs">
            <button class="tab-btn active" data-tab="to">📋 ТО</button>
            <button class="tab-btn" data-tab="stats">📊 Статистика</button>
            <button class="tab-btn" data-tab="history">📜 История</button>
            <button class="tab-btn" data-tab="fuel">⛽ Топливо</button>
            <button class="tab-btn" data-tab="tires">🛞 Шины</button>
            <button class="tab-btn" data-tab="parts">📦 Запчасти</button>
            <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
        </div>

        <!-- Вкладки (идентичны предыдущей монолитной версии, см. ниже) -->
        <div id="tab-to" class="tab-content active">...</div>
        <div id="tab-stats" class="tab-content">...</div>
        <div id="tab-history" class="tab-content">...</div>
        <div id="tab-fuel" class="tab-content">...</div>
        <div id="tab-tires" class="tab-content">...</div>
        <div id="tab-parts" class="tab-content">...</div>
        <div id="tab-settings" class="tab-content">...</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
